# This workflow will install Python dependencies and run tests
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Unit Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Install CSL dependencies
      run: |
        . /etc/os-release
        echo "Using Ubuntu version $UBUNTU_CODENAME"
        sudo apt-get update
        sudo apt-get install -y build-essential libssl-dev uuid-dev libgpgme11-dev squashfs-tools
        wget -q -O singularity.deb https://github.com/sylabs/singularity/releases/download/v4.2.1/singularity-ce_4.2.1-${UBUNTU_CODENAME}_amd64.deb
        sudo apt install ./singularity.deb
        singularity --version

    - name: Cache dependencies
      id: cache-deps
      uses: actions/cache@v4
      with:
        path: cerebras-sdk
        key: ${{ runner.os }}-deps

    - name: Install Cerebras SDK v1.2.0
      if: steps.cache-deps.outputs.cache-hit != 'true'
      run: |
        mkdir cerebras-sdk
        cd cerebras-sdk
        wget -q -O sdk-1.2.0.tar.gz 'https://www.dropbox.com/scl/fi/qapgr3xsz70x6uhs8p3gh/Cerebras-SDK-1.2.0-202406260214-4-70afe120.tar.gz?rlkey=nb9pqad1f81jklgvwzri63e0z&st=vl43ui70&dl=1'
        tar xf sdk-1.2.0.tar.gz
        rm sdk-1.2.0.tar.gz
        cd ..

    - name: Test Cerebras SDK
      run: |
        ./cerebras-sdk/cslc -h

    - name: Test with pytest
      run: |
        PYTHONPATH=`pwd` pytest
